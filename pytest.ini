[pytest]
# ─── Test Discovery ────────────────────────────────────────────────────────────
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*

# ─── Output & Verbosity ────────────────────────────────────────────────────────
# -v        : verbose (show each test name)
# -s        : don't capture stdout (useful for debugging)
# --tb=short: show short tracebacks on failure
addopts =
    -v
    --tb=short
    --html=reports/test-report.html
    --self-contained-html
    --json-report
    --json-report-file=reports/test-report.json

# ─── Custom Markers ────────────────────────────────────────────────────────────
# Markers let you tag tests and run subsets, e.g.: pytest -m smoke
markers =
    smoke: Quick sanity check tests — run on every commit
    regression: Full regression suite — run on nightly/release builds
    negative: Tests for invalid inputs and error conditions
    performance: Tests that check response time thresholds
